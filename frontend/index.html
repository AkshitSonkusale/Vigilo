<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vigilo — Campaign Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,500&family=Lekton:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0C0C;--bg-2:#141414;--bg-3:#1C1C1C;--border:#242424;
  --text:#F0EEE8;--text-2:#888880;--text-3:#444440;
  --amber:#D4A853;--amber-dim:rgba(212,168,83,0.12);
  --red:#C0392B;--red-dim:rgba(192,57,43,0.1);
  --green:#27AE60;--green-dim:rgba(39,174,96,0.1);
  --yellow:#E67E22;--yellow-dim:rgba(230,126,34,0.1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── SCROLL ANIMATION BASE ── */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s ease,transform .7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.22s}
.reveal-delay-3{transition-delay:.34s}
.reveal-delay-4{transition-delay:.46s}

/* ── NAV ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:22px 60px;border-bottom:1px solid var(--border);position:fixed;top:0;width:100%;background:var(--bg);z-index:200}
.wordmark{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;letter-spacing:6px;text-transform:uppercase;color:var(--text);cursor:pointer}
.wordmark-dot{display:inline-block;width:6px;height:6px;background:var(--amber);border-radius:50%;margin-left:2px;margin-bottom:3px;vertical-align:middle;animation:blink 2.4s ease-in-out infinite}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-link{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2);cursor:pointer;text-decoration:none;transition:color .15s}
.nav-link:hover{color:var(--text)}
.btn-primary{background:var(--amber);color:#0C0C0C;border:none;padding:9px 20px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-outline{background:transparent;color:var(--amber);border:1px solid rgba(212,168,83,.35);padding:9px 20px;font-family:'Lekton',monospace;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:6px;cursor:pointer;transition:background .15s,border-color .15s}
.btn-outline:hover{background:var(--amber-dim);border-color:var(--amber)}

/* ── LANDING ── */
.landing{padding-top:65px}

/* HERO */
.hero-section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 120px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero-eyebrow{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:24px;opacity:0;animation:fadeUp .8s ease .2s forwards;text-align:center}
.hero-h1{font-size:clamp(52px,8vw,96px);font-weight:700;letter-spacing:-4px;line-height:1;color:var(--text);margin-bottom:20px;opacity:0;animation:fadeUp .8s ease .35s forwards;text-align:center}
.hero-h1 em{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;color:var(--text-2);letter-spacing:-2px}
.hero-sub{font-family:'Lekton',monospace;font-size:14px;color:var(--text-2);max-width:600px;line-height:1.8;letter-spacing:.02em;margin-bottom:44px;opacity:0;animation:fadeUp .8s ease .5s forwards;text-align:center}
.hero-ctas{display:flex;gap:14px;opacity:0;animation:fadeUp .8s ease .65s forwards;justify-content:center}
.hero-bg-number{position:absolute;right:-20px;top:50%;transform:translateY(-50%);font-size:clamp(200px,28vw,400px);font-weight:700;color:rgba(255,255,255,.015);letter-spacing:-20px;pointer-events:none;user-select:none;line-height:1}

/* WHAT IS VIGILO */
.what-section{padding:100px 60px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.what-label{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:20px}
.what-h2{font-size:36px;font-weight:700;letter-spacing:-1.5px;line-height:1.1;color:var(--text);margin-bottom:20px}
.what-h2 em{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;color:var(--text-2)}
.what-body{font-family:'Lekton',monospace;font-size:13px;color:var(--text-2);line-height:1.85;letter-spacing:.02em}
.what-body strong{color:var(--text);font-weight:700}
.what-right{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.what-stat{background:var(--bg-2);padding:24px 28px}
.what-stat-value{font-size:36px;font-weight:700;letter-spacing:-2px;color:var(--text);line-height:1;margin-bottom:6px}
.what-stat-value span{color:var(--amber)}
.what-stat-label{font-family:'Lekton',monospace;font-size:11px;color:var(--text-3);letter-spacing:.06em}

/* HOW IT WORKS */
.how-section{padding:100px 60px;border-bottom:1px solid var(--border)}
.how-header{margin-bottom:64px;text-align:center}
.how-label{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:16px}
.how-h2{font-size:36px;font-weight:700;letter-spacing:-1.5px;color:var(--text);margin-bottom:10px}
.how-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--text-2)}

/* STEPS */
.steps-wrapper{position:relative;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}



.step{padding:0 48px;position:relative;z-index:1;border-left:1px solid var(--border)}.step:first-child{padding-left:0;border-left:none}
.step:first-child{padding-left:0}
.step:last-child{padding-right:0}
.step-num{font-size:11px;font-family:'Lekton',monospace;letter-spacing:.1em;color:var(--text-3);margin-bottom:20px;display:flex;align-items:center;gap:12px}
.step-num-circle{width:36px;height:36px;border-radius:50%;background:var(--bg-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text);flex-shrink:0;font-family:'Space Grotesk',sans-serif}
.step-num-circle.active{background:var(--amber-dim);border-color:rgba(212,168,83,.4);color:var(--amber)}
.step-title{font-size:20px;font-weight:700;letter-spacing:-.5px;color:var(--text);margin-bottom:10px}
.step-body{font-family:'Lekton',monospace;font-size:12px;color:var(--text-2);line-height:1.8;letter-spacing:.02em}
.step-tag{display:inline-block;font-family:'Lekton',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);padding:3px 8px;border:1px solid rgba(212,168,83,.25);border-radius:4px;margin-top:14px}

/* ML PIPELINE SECTION */
.ml-section{padding:100px 60px;border-bottom:1px solid var(--border)}
.ml-header{margin-bottom:48px}
.ml-label{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:16px}
.ml-h2{font-size:36px;font-weight:700;letter-spacing:-1.5px;color:var(--text);margin-bottom:10px}
.ml-sub{font-family:'Lekton',monospace;font-size:13px;color:var(--text-2);line-height:1.8;max-width:560px}
.ml-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.ml-card{background:var(--bg-2);padding:28px 24px}
.ml-card-num{font-family:'Lekton',monospace;font-size:10px;letter-spacing:.1em;color:var(--text-3);margin-bottom:12px}
.ml-card-title{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--text);margin-bottom:8px}
.ml-card-body{font-family:'Lekton',monospace;font-size:11px;color:var(--text-3);line-height:1.7;letter-spacing:.02em}
.ml-card-tag{display:inline-block;margin-top:12px;font-family:'Lekton',monospace;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.tag-green{background:var(--green-dim);color:var(--green)}
.tag-amber{background:var(--amber-dim);color:var(--amber)}
.tag-red{background:var(--red-dim);color:var(--red)}
.tag-yellow{background:var(--yellow-dim);color:var(--yellow)}

/* CTA SECTION */
.cta-section{padding:120px 60px;text-align:center}
.cta-label{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:20px}
.cta-h2{font-size:clamp(36px,5vw,60px);font-weight:700;letter-spacing:-2px;color:var(--text);margin-bottom:12px;line-height:1.1}
.cta-h2 em{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;color:var(--text-2)}
.cta-sub{font-family:'Lekton',monospace;font-size:13px;color:var(--text-2);margin-bottom:40px;line-height:1.8;letter-spacing:.02em}
.cta-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}

/* ── DASHBOARD (same as before) ── */
.dashboard-nav{display:flex;align-items:center;justify-content:space-between;padding:22px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 40px}
.tab{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding:14px 0;margin-right:32px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tab.active{color:var(--amber);border-bottom-color:var(--amber)}
.dash-hero{padding:40px 40px 36px;border-bottom:1px solid var(--border)}
.dash-hero-label{font-family:'Lekton',monospace;font-size:11px;color:var(--amber);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.dash-hero-title{font-size:30px;font-weight:700;letter-spacing:-1px;line-height:1.1;color:var(--text);margin-bottom:5px}
.dash-hero-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--text-2);letter-spacing:-.3px;line-height:1.3}
.summary{display:grid;grid-template-columns:repeat(6,1fr);border-bottom:1px solid var(--border)}
.s-card{padding:24px 28px;border-right:1px solid var(--border)}
.s-card:last-child{border-right:none}
.s-label{font-family:'Lekton',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2);margin-bottom:8px}
.s-value{font-size:24px;font-weight:700;letter-spacing:-1px;color:var(--text);line-height:1}
.s-value.amber{color:var(--amber)}
.s-change{font-family:'Lekton',monospace;font-size:10px;color:var(--text-3);margin-top:5px}
.main{display:grid;grid-template-columns:1fr 480px;min-height:calc(100vh - 260px)}
.table-section{border-right:1px solid var(--border);padding:28px 40px}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.section-title{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2)}
.section-hint{font-family:'Lekton',monospace;font-size:11px;color:var(--text-3);font-style:italic}
table{width:100%;border-collapse:collapse}
thead th{font-family:'Lekton',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);text-align:left;padding:0 0 12px;border-bottom:1px solid var(--border)}
thead th:last-child{text-align:right}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
tbody tr:hover,tbody tr.active{background:var(--bg-2)}
tbody td{padding:13px 0;vertical-align:middle}
.campaign-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.campaign-cluster{font-family:'Lekton',monospace;font-size:11px;color:var(--text-2)}
.badge{display:inline-flex;align-items:center;gap:5px;font-family:'Lekton',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px}
.badge-high{background:var(--red-dim);color:var(--red)}
.badge-medium{background:var(--yellow-dim);color:var(--yellow)}
.badge-low{background:var(--green-dim);color:var(--green)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.metric-cell{font-size:13px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums}
.metric-sub{font-family:'Lekton',monospace;font-size:11px;color:var(--text-3);margin-top:2px}
.score-cell{display:flex;align-items:center;justify-content:flex-end;gap:10px}
.score-ring{position:relative;width:40px;height:40px}
.score-ring svg{transform:rotate(-90deg)}
.score-number{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text)}
.score-cat{font-family:'Lekton',monospace;font-size:10px;color:var(--text-3);text-align:right}
.rec-panel{padding:28px;overflow-y:auto}
.rec-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:10px;text-align:center}
.rec-empty-title{font-size:14px;font-weight:600;color:var(--text-2)}
.rec-empty-sub{font-family:'Lekton',monospace;font-size:11px;color:var(--text-3);max-width:200px;line-height:1.6}
.rec-campaign-name{font-size:18px;font-weight:700;letter-spacing:-.5px;color:var(--text);margin-bottom:8px}
.rec-meta{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.rec-cluster{font-family:'Lekton',monospace;font-size:11px;color:var(--text-2)}
.big-score{display:flex;align-items:baseline;gap:8px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.big-score-num{font-size:80px;font-weight:700;letter-spacing:-4px;line-height:1}
.big-score-num.excellent{color:var(--green)}
.big-score-num.good{color:var(--amber)}
.big-score-num.average{color:var(--yellow)}
.big-score-num.poor{color:var(--red)}
.big-score-label{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:var(--text-3)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px}
.stat-item{background:var(--bg-2);padding:12px 14px}
.stat-label{font-family:'Lekton',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px}
.stat-value{font-size:22px;font-weight:700;letter-spacing:-.8px;color:var(--text);font-variant-numeric:tabular-nums}
.rec-text-label{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:12px}
.rec-text{font-family:'Lekton',monospace;font-size:14px;line-height:1.9;color:var(--text-2)}
.anomaly-flag{display:inline-flex;align-items:center;gap:5px;font-family:'Lekton',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--red);padding:3px 8px;border:1px solid var(--red-dim);border-radius:4px}
.standout-flag{display:inline-flex;align-items:center;gap:5px;font-family:'Lekton',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green);padding:3px 8px;border:1px solid var(--green-dim);border-radius:4px}
.charts-section{padding:32px 40px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px}
.chart-box{background:var(--bg-2);padding:24px}
.chart-title{font-family:'Lekton',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-2);margin-bottom:4px}
.chart-sub{font-family:'Lekton',monospace;font-size:10px;color:var(--text-3);margin-bottom:20px}
.chart-full{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:24px}
.upload-overlay{position:fixed;inset:0;background:rgba(12,12,12,.97);display:flex;align-items:center;justify-content:center;z-index:300}
.upload-box{border:1px solid var(--border);border-radius:12px;padding:48px;text-align:center;max-width:420px;width:100%;background:var(--bg-2)}
.upload-wordmark{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:8px;text-transform:uppercase;color:var(--text);margin-bottom:24px}
.upload-title{font-family:'Lekton',monospace;font-size:13px;letter-spacing:.06em;color:var(--text-2);margin-bottom:6px;text-transform:uppercase}
.upload-divider{width:28px;height:1px;background:var(--border);margin:0 auto 24px}
.upload-sub{font-family:'Lekton',monospace;font-size:12px;color:var(--text-3);margin-bottom:32px;line-height:1.8;letter-spacing:.02em;white-space:pre-line}
.drop-zone{border:1px dashed var(--border);border-radius:8px;padding:28px 20px;margin-bottom:16px;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--amber);background:var(--amber-dim)}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-label{font-family:'Lekton',monospace;font-size:12px;color:var(--text-3);letter-spacing:.04em}
.drop-label span{color:var(--amber)}
.upload-or{font-family:'Lekton',monospace;font-size:10px;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.upload-note{font-family:'Lekton',monospace;font-size:10px;color:var(--text-3);margin-top:10px}
.upload-error{font-family:'Lekton',monospace;font-size:11px;color:var(--red);margin-top:8px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.loading-text{font-family:'Lekton',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-3)}
.spinner{width:26px;height:26px;border:1.5px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
/* ── HERO IMAGE ── */
.hero-img-wrap{position:absolute;left:-10px;bottom:60px;width:420px;pointer-events:none;transition:opacity .1s linear;z-index:0}
.hero-img-wrap img{width:100%;opacity:.88;filter:drop-shadow(0 20px 60px rgba(0,0,0,.5))}

/* ── FLOATING DOLLARS ── */
.dollars-wrap{position:absolute;right:120px;top:130px;width:200px;pointer-events:none;z-index:0;opacity:.55;filter:brightness(.7)}
.dollars-wrap img{width:100%;animation:floatDollars 6s ease-in-out infinite}
@keyframes floatDollars{
  0%,100%{transform:translateY(0) rotate(-8deg)}
  50%{transform:translateY(-18px) rotate(-4deg)}
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef}=React;
const CLUSTER_COLORS={"Underinvested Winner":"#27AE60","Bleeding Budget":"#C0392B","Steady Performer":"#D4A853","Keyword Waste":"#E67E22"};
const BACKEND='http://localhost:8000';

const SAMPLE={
  account_summary:{total_campaigns:11,total_spend:51050.45,total_conversions:107,account_avg_ctr:2.53,account_avg_cpc:16.57,account_avg_conversion_rate:2.68},
  campaigns:[
    {campaign_name:"Summer Sale - Search",cost:8577.65,conversions:4,ctr:1.68,cpc:19.02,conversion_rate:0.89,cluster_label:"Bleeding Budget",is_anomaly:true,is_standout:false,health_score:2,health_category:"Poor",severity:"High",recommendation_text:"Summer Sale - Search has spent ₹8,578 but converted only 4 times, well below the account average. Pause or significantly reduce budget and redirect toward better-performing campaigns. This campaign has been flagged as a statistical anomaly — its behavior is unusual even compared to other underperforming campaigns."},

/* ── Intersection Observer hook ── */
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
    },{threshold:.15});
    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);
}

/* ── Score Ring ── */
function ScoreRing({score,category}){
  const r=16,cx=20,cy=20,circ=2*Math.PI*r;
  const color=category==='Excellent'?'#27AE60':category==='Good'?'#D4A853':category==='Average'?'#E67E22':'#C0392B';
  return React.createElement('div',{className:'score-ring'},
    React.createElement('svg',{width:40,height:40,viewBox:'0 0 40 40'},
      React.createElement('circle',{cx,cy,r,fill:'none',stroke:'#242424',strokeWidth:2.5}),
      React.createElement('circle',{cx,cy,r,fill:'none',stroke:color,strokeWidth:2.5,
        strokeDasharray:circ,strokeDashoffset:circ*(1-score/100),strokeLinecap:'round',
        style:{transform:'rotate(-90deg)',transformOrigin:'20px 20px'}})
    ),
    React.createElement('div',{className:'score-number'},score)
  );
}

/* ── Scatter Chart ── */
function ScatterChart({campaigns}){
  const W=500,H=280,PAD={t:20,r:20,b:44,l:54};
  const maxCost=Math.max(...campaigns.map(c=>c.cost))*1.1;
  const maxConv=Math.max(...campaigns.map(c=>c.conversions))*1.2||1;
  const px=v=>PAD.l+(v/maxCost)*(W-PAD.l-PAD.r);
  const py=v=>H-PAD.b-(v/maxConv)*(H-PAD.t-PAD.b);
  const [tooltip,setTooltip]=useState(null);
  return React.createElement('div',{style:{position:'relative'}},
    React.createElement('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:{overflow:'visible'}},
      [0,.25,.5,.75,1].map(t=>[
        React.createElement('line',{key:'h'+t,x1:PAD.l,x2:W-PAD.r,y1:py(maxConv*t),y2:py(maxConv*t),stroke:'#1C1C1C',strokeWidth:1}),
        React.createElement('line',{key:'v'+t,x1:px(maxCost*t),x2:px(maxCost*t),y1:PAD.t,y2:H-PAD.b,stroke:'#1C1C1C',strokeWidth:1})
      ]),
      React.createElement('text',{x:W/2,y:H-4,textAnchor:'middle',fontSize:9,fill:'#444440',fontFamily:'Lekton,monospace',letterSpacing:1},'SPEND (₹)'),
      React.createElement('text',{x:12,y:H/2,textAnchor:'middle',fontSize:9,fill:'#444440',fontFamily:'Lekton,monospace',letterSpacing:1,transform:`rotate(-90,12,${H/2})`},'CONVERSIONS'),
      campaigns.filter(c=>c.is_anomaly||c.is_standout).map((c,i)=>React.createElement('circle',{key:'r'+i,cx:px(c.cost),cy:py(c.conversions),r:13,fill:'none',stroke:c.is_anomaly?'#C0392B':'#27AE60',strokeWidth:1,strokeDasharray:'3 3',opacity:.7})),
      campaigns.map((c,i)=>React.createElement('circle',{key:i,cx:px(c.cost),cy:py(c.conversions),r:7,fill:CLUSTER_COLORS[c.cluster_label]||'#888',opacity:.85,style:{cursor:'pointer'},onMouseEnter:()=>setTooltip(c),onMouseLeave:()=>setTooltip(null)})),
      tooltip&&React.createElement('g',null,
        React.createElement('rect',{x:px(tooltip.cost)+14,y:py(tooltip.conversions)-36,width:160,height:48,rx:4,fill:'#1C1C1C',stroke:'#2C2C2C'}),
        React.createElement('text',{x:px(tooltip.cost)+22,y:py(tooltip.conversions)-16,fontSize:10,fill:'#F0EEE8',fontFamily:'Space Grotesk,sans-serif',fontWeight:600},tooltip.campaign_name.split(' - ')[0]),
        React.createElement('text',{x:px(tooltip.cost)+22,y:py(tooltip.conversions)+2,fontSize:9,fill:'#888880',fontFamily:'Lekton,monospace'},`₹${Math.round(tooltip.cost).toLocaleString()} · ${tooltip.conversions} conv.`)
      )
    ),
    React.createElement('div',{style:{display:'flex',gap:16,flexWrap:'wrap',marginTop:12}},
      Object.entries(CLUSTER_COLORS).map(([label,color])=>
        React.createElement('div',{key:label,style:{display:'flex',alignItems:'center',gap:6}},
          React.createElement('div',{style:{width:8,height:8,borderRadius:'50%',background:color}}),
          React.createElement('span',{style:{fontFamily:'Lekton,monospace',fontSize:10,color:'#444440'}},label)
        )
      )
    )
  );
}

/* ── Health Chart ── */
function HealthChart({campaigns}){
  const sorted=[...campaigns].sort((a,b)=>a.health_score-b.health_score);
  const color=cat=>cat==='Excellent'?'#27AE60':cat==='Good'?'#D4A853':cat==='Average'?'#E67E22':'#C0392B';
  return React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
    sorted.map((c,i)=>React.createElement('div',{key:i,style:{display:'flex',alignItems:'center',gap:14}},
      React.createElement('div',{style:{fontFamily:'Lekton,monospace',fontSize:10,color:'#444440',width:150,flexShrink:0,textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},c.campaign_name.split(' - ')[0]),
      React.createElement('div',{style:{flex:1,height:6,background:'#1C1C1C',borderRadius:3,overflow:'hidden'}},
        React.createElement('div',{style:{width:`${c.health_score}%`,height:'100%',background:color(c.health_category),borderRadius:3}})
      ),
      React.createElement('div',{style:{fontFamily:'Lekton,monospace',fontSize:10,color:'#888880',width:24,textAlign:'right',flexShrink:0}},c.health_score)
    ))
  );
}

/* ── Main App ── */
function App(){
  const [screen,setScreen]=useState('landing'); // 'landing' | 'dashboard'
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [loadingMsg,setLoadingMsg]=useState('');
  const [selected,setSelected]=useState(null);
  const [showUpload,setShowUpload]=useState(false);
  const [tab,setTab]=useState('campaigns');
  const [dragOver,setDragOver]=useState(false);
  const [uploadError,setUploadError]=useState('');

  const pipelineMsgs=['Parsing campaign data...','Running K-Means clustering...','Detecting anomalies...','Scoring campaigns...','Generating recommendations...'];

  function startMsgCycle(){
    let i=0;setLoadingMsg(pipelineMsgs[0]);
    return setInterval(()=>{if(i<pipelineMsgs.length-1)setLoadingMsg(pipelineMsgs[++i]);},700);
  }

  async function loadDemo(){
    setShowUpload(false);setScreen('dashboard');setLoading(true);
    const interval=startMsgCycle();
    try{
      const res=await fetch(`${BACKEND}/api/sample`);
      clearInterval(interval);
      if(res.ok){const r=await res.json();setData(r);setSelected(r.campaigns[0]);}
      else throw new Error();
    }catch{
      clearInterval(interval);
      await new Promise(r=>setTimeout(r,1800));
      setData(SAMPLE);setSelected(SAMPLE.campaigns[0]);
    }
    setLoading(false);
  }

  async function handleFile(file){
    if(!file)return;
    if(!file.name.endsWith('.csv')){setUploadError('Please upload a .csv file exported from Google Ads.');return;}
    setUploadError('');setShowUpload(false);setScreen('dashboard');setLoading(true);
    const interval=startMsgCycle();
    try{
      const form=new FormData();form.append('file',file);
      const res=await fetch(`${BACKEND}/api/upload`,{method:'POST',body:form});
      clearInterval(interval);
      if(!res.ok){const e=await res.json();throw new Error(e.detail||'Upload failed');}
      const r=await res.json();setData(r);setSelected(r.campaigns[0]);
    }catch(e){
      clearInterval(interval);
      setScreen('landing');setShowUpload(true);
      setUploadError(e.message||'Upload failed. Check your CSV format and try again.');
    }
    setLoading(false);
  }

  const s=data?.account_summary;

  return React.createElement('div',null,
    // NAV — always visible
    React.createElement('nav',null,
      React.createElement('div',{className:'wordmark',onClick:()=>setScreen('landing')},'VIGILO',React.createElement('span',{className:'wordmark-dot'})),
      React.createElement('div',{className:'nav-right'},
        screen==='landing'&&React.createElement('a',{className:'nav-link',href:'#how-it-works'},'How it works'),
        screen==='landing'&&React.createElement('a',{className:'nav-link',href:'#how-it-works',onClick:e=>{e.preventDefault();document.getElementById('how-it-works')?.scrollIntoView({behavior:'smooth'})}},'ML pipeline'),
        screen==='dashboard'&&data&&React.createElement('span',{style:{fontFamily:'Lekton,monospace',fontSize:11,color:'var(--text-2)'}},`${s.total_campaigns} campaigns · ₹${(s.total_spend/1000).toFixed(1)}k spend`),
        React.createElement('button',{className:'btn-primary',onClick:()=>{setShowUpload(true);setUploadError('');}},screen==='landing'?'Try it now →':'Upload CSV')
      )
    ),

    // UPLOAD OVERLAY
    showUpload&&React.createElement('div',{className:'upload-overlay'},
      React.createElement('div',{className:'upload-box'},
        React.createElement('div',{className:'upload-wordmark'},'VIGILO',React.createElement('span',{className:'wordmark-dot',style:{width:7,height:7}})),
        React.createElement('div',{className:'upload-title'},'Campaign Intelligence'),
        React.createElement('div',{className:'upload-divider'}),
        React.createElement('div',{className:'upload-sub'},'Upload a Google Ads CSV export.\nGet ML-powered insights in under 60 seconds.'),
        React.createElement('div',{
          className:`drop-zone${dragOver?' drag-over':''}`,
          onDragOver:e=>{e.preventDefault();setDragOver(true)},
          onDragLeave:()=>setDragOver(false),
          onDrop:e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0])}
        },
          React.createElement('input',{type:'file',accept:'.csv',onChange:e=>handleFile(e.target.files[0])}),
          React.createElement('div',{className:'drop-label'},dragOver?'Drop to analyse →':'Drag & drop your CSV or ',React.createElement('span',null,'browse'))
        ),
        React.createElement('div',{className:'upload-or'},'— or —'),
        React.createElement('button',{
          className:'btn-outline',style:{width:'100%',marginBottom:10,padding:'12px 24px'},
          onClick:loadDemo
        },'Load sample dataset →'),
        uploadError&&React.createElement('div',{className:'upload-error'},uploadError),
        React.createElement('div',{className:'upload-note'},'No file? Try the demo — all 11 campaign archetypes included.'),
        React.createElement('div',{style:{marginTop:16}},
          React.createElement('button',{
            onClick:()=>{setShowUpload(false);setUploadError('');},
            style:{background:'none',border:'none',fontFamily:'Lekton,monospace',fontSize:11,color:'var(--text-3)',cursor:'pointer',letterSpacing:'.06em'}
          },'← Back')
        )
      )
    ),

    // LANDING
    screen==='landing'&&React.createElement(Landing,{onTryDemo:loadDemo}),

    // LOADING
    screen==='dashboard'&&loading&&React.createElement('div',{className:'loading',style:{paddingTop:65}},
      React.createElement('div',{className:'spinner'}),
      React.createElement('div',{className:'loading-text'},loadingMsg)
    ),

    // DASHBOARD
    screen==='dashboard'&&data&&!loading&&React.createElement('div',null,
      React.createElement('div',{className:'dash-hero',style:{paddingTop:100}},
        React.createElement('div',{className:'dash-hero-label'},'Campaign intelligence'),
        React.createElement('div',{className:'dash-hero-title'},'Your account needs attention.'),
        React.createElement('div',{className:'dash-hero-sub'},
          `${data.campaigns.filter(c=>c.severity==='High').length} campaigns flagged high severity, ${data.campaigns.filter(c=>c.is_standout).length} underinvested winners identified.`
        )
      ),
      React.createElement('div',{className:'summary'},
        [['Total Spend',`₹${(s.total_spend/1000).toFixed(1)}k`,'11 campaigns',false],
         ['Conversions',s.total_conversions,'This period',false],
         ['Avg CTR',`${s.account_avg_ctr}%`,'Account average',false],
         ['Avg CPC',`₹${s.account_avg_cpc}`,'Account average',false],
         ['Avg CVR',`${s.account_avg_conversion_rate}%`,'Account average',false],
         ['Flagged',data.campaigns.filter(c=>c.severity==='High').length,'High severity',true]
        ].map(([l,v,sub,am])=>React.createElement('div',{className:'s-card',key:l},
          React.createElement('div',{className:'s-label'},l),
          React.createElement('div',{className:`s-value${am?' amber':''}`},v),
          React.createElement('div',{className:'s-change'},sub)
        ))
      ),
      React.createElement('div',{className:'tabs'},
        ['campaigns','charts'].map(t=>React.createElement('div',{key:t,className:`tab${tab===t?' active':''}`,onClick:()=>setTab(t)},t))
      ),

      // CAMPAIGNS TAB
      tab==='campaigns'&&React.createElement('div',{className:'main'},
        React.createElement('div',{className:'table-section'},
          React.createElement('div',{className:'section-header'},
            React.createElement('div',{className:'section-title'},'Campaigns'),
            React.createElement('div',{className:'section-hint'},'Select a row to view recommendation')
          ),
          React.createElement('table',null,
            React.createElement('thead',null,
              React.createElement('tr',null,
                ['Campaign','Spend','CTR / CVR','Severity','Health'].map(h=>
                  React.createElement('th',{key:h,style:h==='Health'?{textAlign:'right'}:{}},h)
                )
              )
            ),
            React.createElement('tbody',null,
              data.campaigns.map((c,i)=>React.createElement('tr',{key:i,className:selected?.campaign_name===c.campaign_name?'active':'',onClick:()=>setSelected(c)},
                React.createElement('td',null,
                  React.createElement('div',{className:'campaign-name'},c.campaign_name),
                  React.createElement('div',{className:'campaign-cluster'},c.cluster_label)
                ),
                React.createElement('td',null,
                  React.createElement('div',{className:'metric-cell'},`₹${c.cost.toLocaleString('en-IN',{maximumFractionDigits:0})}`),
                  React.createElement('div',{className:'metric-sub'},`${c.conversions} conversions`)
                ),
                React.createElement('td',null,
                  React.createElement('div',{className:'metric-cell'},`${c.ctr}%`),
                  React.createElement('div',{className:'metric-sub'},`${c.conversion_rate}% cvr`)
                ),
                React.createElement('td',null,
                  React.createElement('span',{className:`badge badge-${c.severity.toLowerCase()}`},
                    React.createElement('span',{className:'dot'}),c.severity
                  )
                ),
                React.createElement('td',null,
                  React.createElement('div',{className:'score-cell'},
                    React.createElement('div',{className:'score-cat'},c.health_category),
                    React.createElement(ScoreRing,{score:c.health_score,category:c.health_category})
                  )
                )
              ))
            )
          )
        ),
        React.createElement('div',{className:'rec-panel'},
          !selected
            ?React.createElement('div',{className:'rec-empty'},
                React.createElement('div',{className:'rec-empty-title'},'No campaign selected'),
                React.createElement('div',{className:'rec-empty-sub'},'Click any row to view its ML-generated recommendation.')
              )
            :React.createElement('div',null,
                React.createElement('div',{className:'section-title',style:{marginBottom:16}},'Recommendation'),
                React.createElement('div',{className:'rec-campaign-name'},selected.campaign_name),
                React.createElement('div',{className:'rec-meta'},
                  React.createElement('span',{className:'rec-cluster'},selected.cluster_label),
                  selected.is_anomaly&&React.createElement('span',{className:'anomaly-flag'},React.createElement('span',{className:'dot'}),'Anomaly'),
                  selected.is_standout&&React.createElement('span',{className:'standout-flag'},React.createElement('span',{className:'dot'}),'Standout')
                ),
                React.createElement('div',{className:'big-score'},
                  React.createElement('div',{className:`big-score-num ${selected.health_category.toLowerCase()}`},selected.health_score),
                  React.createElement('div',{className:'big-score-label'},selected.health_category)
                ),
                React.createElement('div',{className:'stats-grid'},
                  [['Spend',`₹${selected.cost.toLocaleString('en-IN',{maximumFractionDigits:0})}`],['Conversions',selected.conversions],['CTR',`${selected.ctr}%`],['CPC',`₹${selected.cpc}`]]
                  .map(([l,v])=>React.createElement('div',{className:'stat-item',key:l},
                    React.createElement('div',{className:'stat-label'},l),
                    React.createElement('div',{className:'stat-value'},v)
                  ))
                ),
                React.createElement('div',{className:'rec-text-label'},'Action required'),
                React.createElement('div',{className:'rec-text'},selected.recommendation_text)
              )
        )
      ),

      // CHARTS TAB
      tab==='charts'&&React.createElement('div',{className:'charts-section'},
        React.createElement('div',{className:'charts-grid'},
          React.createElement('div',{className:'chart-box'},
            React.createElement('div',{className:'chart-title'},'Spend vs Conversions'),
            React.createElement('div',{className:'chart-sub'},'Coloured by K-Means cluster · hover for details'),
            React.createElement(ScatterChart,{campaigns:data.campaigns})
          ),
          React.createElement('div',{className:'chart-box'},
            React.createElement('div',{className:'chart-title'},'Cluster Distribution'),
            React.createElement('div',{className:'chart-sub'},'Campaigns per performance profile'),
            React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14,marginTop:8}},
              Object.entries(CLUSTER_COLORS).map(([label,color])=>{
                const count=data.campaigns.filter(c=>c.cluster_label===label).length;
                return React.createElement('div',{key:label},
                  React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
                    React.createElement('span',{style:{fontFamily:'Lekton,monospace',fontSize:11,color:'#888880'}},label),
                    React.createElement('span',{style:{fontFamily:'Lekton,monospace',fontSize:11,color:'#444440'}},`${count} campaign${count!==1?'s':''}`)
                  ),
                  React.createElement('div',{style:{height:6,background:'#1C1C1C',borderRadius:3,overflow:'hidden'}},
                    React.createElement('div',{style:{width:`${(count/data.campaigns.length)*100}%`,height:'100%',background:color,borderRadius:3}})
                  )
                );
              })
            )
          )
        ),
        React.createElement('div',{className:'chart-full'},
          React.createElement('div',{className:'chart-title'},'Campaign Health Scores'),
          React.createElement('div',{className:'chart-sub',style:{marginBottom:20}},'All campaigns ranked lowest to highest'),
          React.createElement(HealthChart,{campaigns:data.campaigns})
        )
      )
    )
  );
}


// Fade hero image on scroll
window.addEventListener('scroll', function(){
  var wrap = document.querySelector('.hero-img-wrap');
  if(!wrap) return;
  var scrolled = window.scrollY;
  var heroH = window.innerHeight;
  var opacity = Math.max(0, 1 - (scrolled / (heroH * 0.5)));
  wrap.style.opacity = opacity;
});

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
