services:
  - type: web
    name: vigilo-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false        # set manually in Render dashboard
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard